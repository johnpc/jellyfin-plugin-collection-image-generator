name: CI
on:
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore jellyfin-plugin-collection-image-generator.sln
      - name: Check formatting
        run: dotnet format jellyfin-plugin-collection-image-generator.sln --verify-no-changes
      - name: Build (strict)
        run: dotnet build jellyfin-plugin-collection-image-generator.sln --configuration Release /p:TreatWarningsAsErrors=true
      - name: Run unit tests with coverage
        run: |
          dotnet test Jellyfin.Plugin.CollectionImageGenerator.Tests/Jellyfin.Plugin.CollectionImageGenerator.Tests.csproj \
            --configuration Release \
            --no-build \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=json \
            /p:CoverletOutput=../coverage/coverage.json \
            '/p:Include=[Jellyfin.Plugin.CollectionImageGenerator]*' \
            /p:ThresholdType=line \
            /p:Threshold=25
      - name: Run acceptance tests
        run: |
          dotnet test Jellyfin.Plugin.CollectionImageGenerator.AcceptanceTests/Jellyfin.Plugin.CollectionImageGenerator.AcceptanceTests.csproj \
            --configuration Release \
            --no-build
      - name: CRAP score check
        run: bash scripts/check-crap.sh coverage/coverage.json
